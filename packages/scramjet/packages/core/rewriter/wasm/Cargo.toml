[package]
name = "wasm"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[lib]
crate-type = ["cdylib"]

[dependencies]
oxc = { workspace = true }
js = { version = "0.1.0", path = "../js", default-features = false }
thiserror = "2.0.17"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.141"

[features]
default = ["debug"]
debug = ["js/debug"]
